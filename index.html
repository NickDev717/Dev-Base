<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Base</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1 class="logo">Dev Base</h1>
            <div class="search-wrapper">
                <input type="text" id="campoBusca" placeholder="Buscar tecnologias, ferramentas, frameworks..." autocomplete="off">
                <button id="botaoBusca" class="btn-search">Buscar</button>
            </div>
            <nav class="nav-links">
                <a href="https://github.com/NickDev717/Dev-Base" target="_blank" rel="noopener noreferrer">GitHub Project</a>
                <a href="https://www.alura.com.br/" target="_blank" rel="noopener noreferrer">Alura</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div id="cardContainer" class="card-container"></div>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <span class="footer-location">Dev Base © 2026</span>
            <ul class="footer-links">
                <li><a href="#">Início</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
